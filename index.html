<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>週報コーチ</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink2: #3d3d5c;
    --muted: #8888aa;
    --bg: #f7f5f0;
    --surface: #ffffff;
    --accent: #e8673a;
    --accent2: #f5a623;
    --teal: #2d9b8a;
    --border: #e2ddd6;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    color: #fff;
    letter-spacing: .04em;
  }
  .logo span { color: var(--accent2); }
  .nav-tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,.08);
    border-radius: 10px;
    padding: 4px;
  }
  .nav-tab {
    padding: 7px 18px;
    border-radius: 7px;
    font-size: 13px;
    color: rgba(255,255,255,.6);
    cursor: pointer;
    transition: all .2s;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-tab.active {
    background: var(--accent);
    color: #fff;
  }
  .nav-tab:hover:not(.active) { color: #fff; }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .install-btn {
    display: none;
    border: 1px solid rgba(255,255,255,.16);
    background: rgba(255,255,255,.08);
    color: #fff;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .install-btn.visible {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .install-btn:hover {
    background: rgba(255,255,255,.16);
  }
  .pwa-pill {
    display: none;
    font-size: 11px;
    color: rgba(255,255,255,.8);
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 7px 10px;
    border-radius: 999px;
    letter-spacing: .04em;
  }
  .pwa-pill.visible {
    display: inline-flex;
  }

  .app { display: none; padding: 32px 24px; max-width: 860px; margin: 0 auto; }
  .app.active { display: block; }

  .week-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: #fff;
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: .06em;
  }
  .week-badge .dot { width:7px;height:7px;background:var(--accent2);border-radius:50%; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 16px;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .card-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: .02em;
  }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
    min-height: 90px;
    transition: border-color .2s;
    line-height: 1.7;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: #bbb; }

  .daily-list { display: flex; flex-direction: column; gap: 10px; }
  .daily-entry {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .day-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    padding-top: 12px;
    min-width: 32px;
    letter-spacing: .04em;
  }
  .daily-entry textarea { min-height: 60px; }

  .submit-wrap {
    margin-top: 8px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .2s;
  }
  .btn-primary:hover { background: #d45a30; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: transparent;
    color: var(--ink2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--ink2); }

  #result-panel {
    display: none;
    margin-top: 8px;
  }
  .result-card {
    background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4e 100%);
    border-radius: var(--radius);
    padding: 28px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: var(--accent);
    opacity: .06;
    border-radius: 50%;
  }
  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .result-badge {
    background: var(--accent);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .06em;
    font-weight: 500;
  }
  .result-date { font-size: 12px; color: rgba(255,255,255,.45); margin-left: auto; }
  .result-body {
    font-size: 14px;
    line-height: 1.9;
    color: rgba(255,255,255,.88);
    white-space: pre-wrap;
  }
  .loading-dots {
    display: flex;
    gap: 6px;
    padding: 8px 0;
  }
  .loading-dots span {
    width: 8px; height: 8px;
    background: var(--accent2);
    border-radius: 50%;
    animation: bounce .8s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .15s; }
  .loading-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: .5; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .history-empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .history-grid { display: flex; flex-direction: column; gap: 14px; }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .history-item:hover { border-color: var(--accent); transform: translateX(3px); }
  .history-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .history-week-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }
  .history-date { font-size: 11px; color: var(--muted); }
  .history-preview {
    font-size: 13px;
    color: var(--ink2);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .history-chips {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .chip.filled { background: #fff0ea; border-color: #f5c9b5; color: var(--accent); }

  .growth-card {
    background:
      radial-gradient(circle at top right, rgba(232, 103, 58, 0.12), transparent 34%),
      linear-gradient(180deg, #fffdf9 0%, #ffffff 100%);
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) + 2px);
    padding: 22px 22px 18px;
    margin-bottom: 18px;
  }
  .growth-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .growth-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .growth-subtitle {
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .growth-score {
    text-align: right;
    min-width: 120px;
  }
  .growth-score-label {
    font-size: 11px;
    letter-spacing: .06em;
    color: var(--muted);
  }
  .growth-score-value {
    font-size: 30px;
    line-height: 1;
    color: var(--ink);
    margin-top: 6px;
  }
  .growth-score-value span {
    font-size: 12px;
    color: var(--muted);
    margin-left: 4px;
  }
  .growth-chart {
    width: 100%;
    height: 220px;
    display: block;
  }
  .growth-axis {
    font-size: 11px;
    fill: var(--muted);
  }
  .growth-grid {
    stroke: rgba(61, 61, 92, 0.12);
    stroke-width: 1;
  }
  .growth-area {
    fill: rgba(232, 103, 58, 0.12);
  }
  .growth-line {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .growth-point {
    fill: #fff;
    stroke: var(--accent);
    stroke-width: 2;
  }
  .growth-point.latest {
    fill: var(--accent2);
    stroke: #fff;
    stroke-width: 3;
  }
  .growth-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-top: 14px;
  }
  .growth-metric {
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--bg);
    border: 1px solid rgba(61, 61, 92, 0.08);
  }
  .growth-metric-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: .04em;
  }
  .growth-metric-value {
    font-size: 18px;
    color: var(--ink);
    font-weight: 600;
  }
  .growth-metric-note {
    margin-top: 4px;
    font-size: 12px;
    color: var(--ink2);
  }
  .history-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn-export {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-export:hover {
    background: #252542;
    transform: translateY(-1px);
  }
  .toolbar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-import {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-import:hover {
    border-color: var(--ink2);
    background: rgba(255,255,255,.7);
  }

  @media (max-width: 640px) {
    header {
      padding: 16px 18px;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-actions {
      width: 100%;
      justify-content: space-between;
    }
    .growth-header {
      flex-direction: column;
    }
    .growth-score {
      text-align: left;
      min-width: 0;
    }
    .growth-chart {
      height: 200px;
    }
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 18px;
    padding: 28px;
    max-width: 620px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-title { font-family: 'Noto Serif JP', serif; font-size: 17px; }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .modal-close:hover { border-color: var(--ink); color: var(--ink); }
  .modal-section { margin-bottom: 18px; }
  .modal-section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .modal-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink2);
    background: var(--bg);
    padding: 12px 14px;
    border-radius: 10px;
    white-space: pre-wrap;
  }
  .modal-feedback {
    background: linear-gradient(135deg, #1a1a2e, #2d2d4e);
    color: rgba(255,255,255,.88);
    font-size: 14px;
    line-height: 1.9;
    padding: 16px 18px;
    border-radius: 10px;
    white-space: pre-wrap;
  }

  .progress-wrap { margin-bottom: 24px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .5s ease;
  }

  .streak-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--ink2);
  }
  .streak-fire { font-size: 18px; }
  .streak-num { font-weight: 500; color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">週報<span>コーチ</span></div>
  <div class="header-actions">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('input')">今週を記録</button>
      <button class="nav-tab" onclick="showTab('history')">過去の記録</button>
    </div>
    <div id="pwa-status" class="pwa-pill">APP READY</div>
    <button id="install-btn" class="install-btn" type="button" onclick="installPwa()">Install App</button>
  </div>
</header>

<!-- INPUT TAB -->
<div id="tab-input" class="app active">
  <div class="week-badge">
    <div class="dot"></div>
    <span id="week-label">今週</span>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#fff0ea;">📝</div>
      <div>
        <div class="card-title">今週やったこと</div>
        <div class="card-sub">取り組んだタスク・プロジェクト</div>
      </div>
    </div>
    <textarea id="did" placeholder="例：新機能のデザイン案を3パターン作成、チームMTGで発表…"></textarea>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#e8f7f4;">⚖️</div>
      <div>
        <div class="card-title">うまくいったこと・いかなかったこと</div>
        <div class="card-sub">振り返りのための正直な記録</div>
      </div>
    </div>
    <textarea id="good" placeholder="うまくいったこと: "></textarea>
    <div style="height:10px"></div>
    <textarea id="bad" placeholder="うまくいかなかったこと: "></textarea>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#f0eeff;">💡</div>
      <div>
        <div class="card-title">気づき・学び</div>
        <div class="card-sub">今週ハッとしたこと・新しく知ったこと</div>
      </div>
    </div>
    <textarea id="learning" placeholder="例：タスクの優先順位を口頭で確認する前に文書化することで認識ズレが減った…"></textarea>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#fff8e8;">🎯</div>
      <div>
        <div class="card-title">来週の目標</div>
        <div class="card-sub">具体的な行動目標</div>
      </div>
    </div>
    <textarea id="next" placeholder="例：毎朝9時にタスクリストを更新する、週3回30分の集中ブロックをカレンダーに入れる…"></textarea>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#fef0f0;">📅</div>
      <div>
        <div class="card-title">日々のメモ（任意）</div>
        <div class="card-sub">各曜日の出来事や気分を残しておこう</div>
      </div>
    </div>
    <div class="daily-list">
      <div class="daily-entry"><span class="day-label">月</span><textarea id="d-mon" placeholder="月曜日のメモ…" style="min-height:52px;"></textarea></div>
      <div class="daily-entry"><span class="day-label">火</span><textarea id="d-tue" placeholder="火曜日のメモ…" style="min-height:52px;"></textarea></div>
      <div class="daily-entry"><span class="day-label">水</span><textarea id="d-wed" placeholder="水曜日のメモ…" style="min-height:52px;"></textarea></div>
      <div class="daily-entry"><span class="day-label">木</span><textarea id="d-thu" placeholder="木曜日のメモ…" style="min-height:52px;"></textarea></div>
      <div class="daily-entry"><span class="day-label">金</span><textarea id="d-fri" placeholder="金曜日のメモ…" style="min-height:52px;"></textarea></div>
    </div>
  </div>

  <div class="submit-wrap">
    <button class="btn-secondary" onclick="clearForm()">クリア</button>
    <button class="btn-primary" id="submit-btn" onclick="submitWeekly()">
      <span>AIにフィードバックをもらう</span>
      <span>→</span>
    </button>
  </div>

  <div id="result-panel">
    <div style="height:16px"></div>
    <div class="result-card">
      <div class="result-header">
        <div class="result-badge">MENTOR FEEDBACK</div>
        <div class="result-date" id="result-date"></div>
      </div>
      <div id="result-body" class="result-body"></div>
    </div>
  </div>
</div>

<!-- HISTORY TAB -->
<div id="tab-history" class="app">
  <div id="history-content"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>
<input type="file" id="import-json-input" accept=".json,application/json" style="display:none" onchange="importHistoryFromJson(event)">

<script>
const STORAGE_KEY = 'weeklycoach_entries';
let deferredInstallPrompt = null;

function getWeekLabel() {
  const now = new Date();
  const year = now.getFullYear();
  const start = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  return `${year}年 第${week}週`;
}

document.getElementById('week-label').textContent = getWeekLabel();

function showTab(tab) {
  document.querySelectorAll('.app').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'history') renderHistory();
}

function showPwaStatus(message) {
  const pill = document.getElementById('pwa-status');
  if (!pill) return;
  pill.textContent = message;
  pill.classList.add('visible');
}

function hideInstallButton() {
  const button = document.getElementById('install-btn');
  if (button) button.classList.remove('visible');
}

function revealInstallButton() {
  const button = document.getElementById('install-btn');
  if (button) button.classList.add('visible');
}

async function installPwa() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const choice = await deferredInstallPrompt.userChoice;
  if (choice.outcome === 'accepted') {
    hideInstallButton();
    showPwaStatus('INSTALLED');
  }
  deferredInstallPrompt = null;
}

function setupPwa() {
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        await navigator.serviceWorker.register('./sw.js');
        showPwaStatus(window.matchMedia('(display-mode: standalone)').matches ? 'APP MODE' : 'OFFLINE READY');
      } catch (error) {
        showPwaStatus('WEB MODE');
      }
    });
  }

  window.addEventListener('beforeinstallprompt', event => {
    event.preventDefault();
    deferredInstallPrompt = event;
    revealInstallButton();
    showPwaStatus('INSTALL AVAILABLE');
  });

  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    hideInstallButton();
    showPwaStatus('INSTALLED');
  });
}

function clearForm() {
  ['did','good','bad','learning','next','d-mon','d-tue','d-wed','d-thu','d-fri'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('result-panel').style.display = 'none';
}

async function submitWeekly() {
  const did = document.getElementById('did').value.trim();
  const good = document.getElementById('good').value.trim();
  const bad = document.getElementById('bad').value.trim();
  const learning = document.getElementById('learning').value.trim();
  const next = document.getElementById('next').value.trim();
  const daily = {
    月: document.getElementById('d-mon').value.trim(),
    火: document.getElementById('d-tue').value.trim(),
    水: document.getElementById('d-wed').value.trim(),
    木: document.getElementById('d-thu').value.trim(),
    金: document.getElementById('d-fri').value.trim(),
  };

  if (!did && !good && !bad && !learning && !next) {
    alert('何か入力してから送信してください。');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span>分析中…</span>';

  const panel = document.getElementById('result-panel');
  const body = document.getElementById('result-body');
  panel.style.display = 'block';
  body.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  document.getElementById('result-date').textContent = getWeekLabel();

  const dailyText = Object.entries(daily)
    .filter(([,v]) => v)
    .map(([k,v]) => `${k}曜日: ${v}`)
    .join('\n');

  const prompt = `あなたは経験豊富なキャリアメンターです。以下のユーザーの週報を読み、的確で温かみのあるフィードバックを日本語で提供してください。

【今週やったこと】
${did || '（未記入）'}

【うまくいったこと】
${good || '（未記入）'}

【うまくいかなかったこと】
${bad || '（未記入）'}

【気づき・学び】
${learning || '（未記入）'}

【来週の目標】
${next || '（未記入）'}

${dailyText ? `【日々のメモ】\n${dailyText}` : ''}

以下の構成でフィードバックをお願いします（各セクションの見出しは絵文字+タイトルで始めてください）：

✨ 今週の成長ポイント
（具体的に褒める・認める）

🔍 改善のヒント
（うまくいかなかった点への建設的なアドバイス）

🎯 来週に向けてのメンターからの一言
（目標達成に向けた具体的なアクションや視点）

フィードバックは冷静かつ的確に、でも人間らしい温もりで。200〜300字程度にまとめてください。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'フィードバックの取得に失敗しました。';
    body.textContent = text;

    const entry = {
      id: Date.now(),
      week: getWeekLabel(),
      date: new Date().toLocaleDateString('ja-JP'),
      did, good, bad, learning, next, daily,
      feedback: text
    };
    const entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    entries.unshift(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));

  } catch(e) {
    body.textContent = 'エラーが発生しました。もう一度お試しください。';
  }

  btn.disabled = false;
  btn.innerHTML = '<span>AIにフィードバックをもらう</span><span>→</span>';
}

function renderHistory() {
  const entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const container = document.getElementById('history-content');

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="history-empty">
        <div class="empty-icon">📭</div>
        <div>まだ記録がありません</div>
        <div style="font-size:12px;margin-top:6px;">「今週を記録」タブから週報を入力してみましょう</div>
      </div>`;
    return;
  }

  const streak = calcStreak(entries);
  const total = entries.length;
  const growthData = buildGrowthSeries(entries);

  container.innerHTML = `
    ${renderGrowthCard(growthData)}
    <div class="history-toolbar">
      <div class="streak-row">
        <span class="streak-fire">🔥</span>
        <span class="streak-num">${streak}週連続</span>記録中
      </div>
      <div style="font-size:12px;color:var(--muted);">合計 ${total} 件の記録</div>
      <button class="btn-import" onclick="triggerJsonImport()">JSON Import</button>
      <button class="btn-export" onclick="exportHistoryAsJson()">JSON Export</button>
    </div>
    <div class="history-grid">
      ${entries.map(e => `
        <div class="history-item" onclick="openModal(${e.id})">
          <div class="history-item-header">
            <div class="history-week-label">${e.week}</div>
            <div class="history-date">${e.date}</div>
          </div>
          <div class="history-preview">${e.did || e.good || e.learning || '（記録あり）'}</div>
          <div class="history-chips">
            ${e.did ? '<div class="chip filled">やったこと</div>' : ''}
            ${(e.good||e.bad) ? '<div class="chip filled">振り返り</div>' : ''}
            ${e.learning ? '<div class="chip filled">学び</div>' : ''}
            ${e.next ? '<div class="chip filled">来週の目標</div>' : ''}
            ${e.feedback ? '<div class="chip filled">AIフィードバック済</div>' : ''}
          </div>
        </div>`).join('')}
    </div>`;
}

function buildGrowthSeries(entries) {
  const ordered = [...entries].reverse();
  const points = ordered.map((entry, index) => {
    const dailyFilled = entry.daily
      ? Object.values(entry.daily).filter(Boolean).length
      : 0;
    const filledSections = [entry.did, entry.good, entry.bad, entry.learning, entry.next]
      .filter(value => Boolean(value && value.trim()))
      .length;
    const feedbackBonus = entry.feedback ? 8 : 0;
    const score = Math.min(100, filledSections * 16 + dailyFilled * 4 + feedbackBonus);
    return { id: entry.id, label: `W${index + 1}`, week: entry.week, score };
  });

  const latest = points[points.length - 1]?.score ?? 0;
  const previous = points[points.length - 2]?.score ?? latest;
  const delta = latest - previous;
  const average = points.length
    ? Math.round(points.reduce((sum, point) => sum + point.score, 0) / points.length)
    : 0;

  return { points, latest, delta, average };
}

function renderGrowthCard(data) {
  if (!data.points.length) return '';

  const deltaLabel = data.delta > 0 ? `+${data.delta}` : `${data.delta}`;
  const deltaText = data.points.length > 1
    ? `${deltaLabel} pts from last entry`
    : 'Track your first entry to start the trend';

  return `
    <div class="growth-card">
      <div class="growth-header">
        <div>
          <div class="growth-title">Growth Snapshot</div>
          <div class="growth-subtitle">入力の埋まり具合をスコア化して、週ごとの伸びを目で見えるようにしました。</div>
        </div>
        <div class="growth-score">
          <div class="growth-score-label">LATEST SCORE</div>
          <div class="growth-score-value">${data.latest}<span>/100</span></div>
        </div>
      </div>
      ${renderGrowthSvg(data.points)}
      <div class="growth-summary">
        <div class="growth-metric">
          <div class="growth-metric-label">Weekly change</div>
          <div class="growth-metric-value">${deltaLabel} pts</div>
          <div class="growth-metric-note">${deltaText}</div>
        </div>
        <div class="growth-metric">
          <div class="growth-metric-label">Average</div>
          <div class="growth-metric-value">${data.average} pts</div>
          <div class="growth-metric-note">Saved entries: ${data.points.length}</div>
        </div>
      </div>
    </div>`;
}

function renderGrowthSvg(points) {
  const width = 760;
  const height = 220;
  const padding = { top: 18, right: 18, bottom: 42, left: 36 };
  const plotWidth = width - padding.left - padding.right;
  const plotHeight = height - padding.top - padding.bottom;
  const steps = [0, 25, 50, 75, 100];
  const safePoints = points.length === 1 ? [points[0], points[0]] : points;

  const coordinates = safePoints.map((point, index) => {
    const x = padding.left + (plotWidth * index) / Math.max(safePoints.length - 1, 1);
    const y = padding.top + plotHeight - (point.score / 100) * plotHeight;
    return { ...point, x, y };
  });

  const linePath = coordinates
    .map((point, index) => `${index === 0 ? 'M' : 'L'} ${point.x} ${point.y}`)
    .join(' ');
  const areaPath = `${linePath} L ${coordinates[coordinates.length - 1].x} ${padding.top + plotHeight} L ${coordinates[0].x} ${padding.top + plotHeight} Z`;

  return `
    <svg class="growth-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Weekly growth chart">
      ${steps.map(step => {
        const y = padding.top + plotHeight - (step / 100) * plotHeight;
        return `
          <line class="growth-grid" x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}"></line>
          <text class="growth-axis" x="${padding.left - 8}" y="${y + 4}" text-anchor="end">${step}</text>`;
      }).join('')}
      <path class="growth-area" d="${areaPath}"></path>
      <path class="growth-line" d="${linePath}"></path>
      ${coordinates.map((point, index) => `
        <circle class="growth-point ${index === coordinates.length - 1 ? 'latest' : ''}" cx="${point.x}" cy="${point.y}" r="${index === coordinates.length - 1 ? 6 : 4.5}"></circle>
      `).join('')}
      ${coordinates.map(point => `
        <text class="growth-axis" x="${point.x}" y="${height - 14}" text-anchor="middle">${point.label}</text>
      `).join('')}
    </svg>`;
}

function exportHistoryAsJson() {
  const entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (!entries.length) {
    alert('エクスポートする記録がまだありません。');
    return;
  }
  const payload = { exportedAt: new Date().toISOString(), entryCount: entries.length, entries };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const dateStamp = new Date().toISOString().slice(0, 10);
  link.href = url;
  link.download = `weekly-coach-history-${dateStamp}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function triggerJsonImport() {
  const input = document.getElementById('import-json-input');
  input.value = '';
  input.click();
}

async function importHistoryFromJson(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    const importedEntries = Array.isArray(parsed) ? parsed : parsed.entries;
    if (!Array.isArray(importedEntries)) throw new Error('invalid format');

    const normalizedEntries = importedEntries
      .filter(entry => entry && typeof entry === 'object')
      .map(entry => ({
        id: entry.id || Date.now() + Math.random(),
        week: entry.week || '',
        date: entry.date || '',
        did: entry.did || '',
        good: entry.good || '',
        bad: entry.bad || '',
        learning: entry.learning || '',
        next: entry.next || '',
        daily: entry.daily && typeof entry.daily === 'object' ? entry.daily : {},
        feedback: entry.feedback || ''
      }));

    const currentEntries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const mergedEntries = [...currentEntries];
    const existingIds = new Set(currentEntries.map(entry => String(entry.id)));
    normalizedEntries.forEach(entry => {
      const key = String(entry.id);
      if (!existingIds.has(key)) { mergedEntries.push(entry); existingIds.add(key); }
    });
    mergedEntries.sort((a, b) => Number(b.id) - Number(a.id));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(mergedEntries));
    renderHistory();
    const addedCount = mergedEntries.length - currentEntries.length;
    alert(`JSON imported. Added ${addedCount} entries.`);
  } catch (error) {
    alert('Failed to import JSON. Please choose a weekly-coach-history file.');
  } finally {
    event.target.value = '';
  }
}

function calcStreak(entries) {
  if (entries.length === 0) return 0;
  return Math.min(entries.length, 4);
}

function openModal(id) {
  const entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const e = entries.find(x => x.id === id);
  if (!e) return;

  const dailyHtml = e.daily ? Object.entries(e.daily)
    .filter(([,v]) => v)
    .map(([k,v]) => `<b>${k}曜日：</b>${v}`)
    .join('\n') : '';

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${e.week}の週報</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${e.did ? `<div class="modal-section"><div class="modal-section-title">📝 今週やったこと</div><div class="modal-text">${e.did}</div></div>` : ''}
    ${e.good ? `<div class="modal-section"><div class="modal-section-title">✅ うまくいったこと</div><div class="modal-text">${e.good}</div></div>` : ''}
    ${e.bad ? `<div class="modal-section"><div class="modal-section-title">⚠️ うまくいかなかったこと</div><div class="modal-text">${e.bad}</div></div>` : ''}
    ${e.learning ? `<div class="modal-section"><div class="modal-section-title">💡 気づき・学び</div><div class="modal-text">${e.learning}</div></div>` : ''}
    ${e.next ? `<div class="modal-section"><div class="modal-section-title">🎯 来週の目標</div><div class="modal-text">${e.next}</div></div>` : ''}
    ${dailyHtml ? `<div class="modal-section"><div class="modal-section-title">📅 日々のメモ</div><div class="modal-text">${dailyHtml}</div></div>` : ''}
    ${e.feedback ? `<div class="modal-section"><div class="modal-section-title">🤖 AIフィードバック</div><div class="modal-feedback">${e.feedback}</div></div>` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

setupPwa();
</script>
