<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>騾ｱ蝣ｱ繧ｳ繝ｼ繝・/title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink2: #3d3d5c;
    --muted: #8888aa;
    --bg: #f7f5f0;
    --surface: #ffffff;
    --accent: #e8673a;
    --accent2: #f5a623;
    --teal: #2d9b8a;
    --border: #e2ddd6;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* 笏笏 Header 笏笏 */
  header {
    background: var(--ink);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    color: #fff;
    letter-spacing: .04em;
  }
  .logo span { color: var(--accent2); }
  .nav-tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,.08);
    border-radius: 10px;
    padding: 4px;
  }
  .nav-tab {
    padding: 7px 18px;
    border-radius: 7px;
    font-size: 13px;
    color: rgba(255,255,255,.6);
    cursor: pointer;
    transition: all .2s;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-tab.active {
    background: var(--accent);
    color: #fff;
  }
  .nav-tab:hover:not(.active) { color: #fff; }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .install-btn {
    display: none;
    border: 1px solid rgba(255,255,255,.16);
    background: rgba(255,255,255,.08);
    color: #fff;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .install-btn.visible {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .install-btn:hover {
    background: rgba(255,255,255,.16);
  }
  .pwa-pill {
    display: none;
    font-size: 11px;
    color: rgba(255,255,255,.8);
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 7px 10px;
    border-radius: 999px;
    letter-spacing: .04em;
  }
  .pwa-pill.visible {
    display: inline-flex;
  }

  /* 笏笏 Layout 笏笏 */
  .app { display: none; padding: 32px 24px; max-width: 860px; margin: 0 auto; }
  .app.active { display: block; }

  /* 笏笏 Week badge 笏笏 */
  .week-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: #fff;
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: .06em;
  }
  .week-badge .dot { width:7px;height:7px;background:var(--accent2);border-radius:50%; }

  /* 笏笏 Section card 笏笏 */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 16px;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .card-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: .02em;
  }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
    min-height: 90px;
    transition: border-color .2s;
    line-height: 1.7;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: #bbb; }

  /* daily entries */
  .daily-list { display: flex; flex-direction: column; gap: 10px; }
  .daily-entry {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .day-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    padding-top: 12px;
    min-width: 32px;
    letter-spacing: .04em;
  }
  .daily-entry textarea { min-height: 60px; }

  /* 笏笏 Submit button 笏笏 */
  .submit-wrap {
    margin-top: 8px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .2s;
  }
  .btn-primary:hover { background: #d45a30; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: transparent;
    color: var(--ink2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--ink2); }

  /* 笏笏 AI Result panel 笏笏 */
  #result-panel {
    display: none;
    margin-top: 8px;
  }
  .result-card {
    background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4e 100%);
    border-radius: var(--radius);
    padding: 28px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: var(--accent);
    opacity: .06;
    border-radius: 50%;
  }
  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .result-badge {
    background: var(--accent);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .06em;
    font-weight: 500;
  }
  .result-date { font-size: 12px; color: rgba(255,255,255,.45); margin-left: auto; }
  .result-body {
    font-size: 14px;
    line-height: 1.9;
    color: rgba(255,255,255,.88);
    white-space: pre-wrap;
  }
  .loading-dots {
    display: flex;
    gap: 6px;
    padding: 8px 0;
  }
  .loading-dots span {
    width: 8px; height: 8px;
    background: var(--accent2);
    border-radius: 50%;
    animation: bounce .8s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .15s; }
  .loading-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: .5; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  /* 笏笏 History tab 笏笏 */
  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .history-empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .history-grid { display: flex; flex-direction: column; gap: 14px; }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .history-item:hover { border-color: var(--accent); transform: translateX(3px); }
  .history-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .history-week-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }
  .history-date { font-size: 11px; color: var(--muted); }
  .history-preview {
    font-size: 13px;
    color: var(--ink2);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .history-chips {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .chip.filled { background: #fff0ea; border-color: #f5c9b5; color: var(--accent); }

  .growth-card {
    background:
      radial-gradient(circle at top right, rgba(232, 103, 58, 0.12), transparent 34%),
      linear-gradient(180deg, #fffdf9 0%, #ffffff 100%);
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) + 2px);
    padding: 22px 22px 18px;
    margin-bottom: 18px;
  }
  .growth-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .growth-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .growth-subtitle {
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .growth-score {
    text-align: right;
    min-width: 120px;
  }
  .growth-score-label {
    font-size: 11px;
    letter-spacing: .06em;
    color: var(--muted);
  }
  .growth-score-value {
    font-size: 30px;
    line-height: 1;
    color: var(--ink);
    margin-top: 6px;
  }
  .growth-score-value span {
    font-size: 12px;
    color: var(--muted);
    margin-left: 4px;
  }
  .growth-chart {
    width: 100%;
    height: 220px;
    display: block;
  }
  .growth-axis {
    font-size: 11px;
    fill: var(--muted);
  }
  .growth-grid {
    stroke: rgba(61, 61, 92, 0.12);
    stroke-width: 1;
  }
  .growth-area {
    fill: rgba(232, 103, 58, 0.12);
  }
  .growth-line {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .growth-point {
    fill: #fff;
    stroke: var(--accent);
    stroke-width: 2;
  }
  .growth-point.latest {
    fill: var(--accent2);
    stroke: #fff;
    stroke-width: 3;
  }
  .growth-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-top: 14px;
  }
  .growth-metric {
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--bg);
    border: 1px solid rgba(61, 61, 92, 0.08);
  }
  .growth-metric-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: .04em;
  }
  .growth-metric-value {
    font-size: 18px;
    color: var(--ink);
    font-weight: 600;
  }
  .growth-metric-note {
    margin-top: 4px;
    font-size: 12px;
    color: var(--ink2);
  }
  .history-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .history-toolbar-meta {
    font-size: 12px;
    color: var(--muted);
  }
  .btn-export {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-export:hover {
    background: #252542;
    transform: translateY(-1px);
  }
  .toolbar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-import {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-import:hover {
    border-color: var(--ink2);
    background: rgba(255,255,255,.7);
  }

  @media (max-width: 640px) {
    header {
      padding: 16px 18px;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-actions {
      width: 100%;
      justify-content: space-between;
    }
    .growth-header {
      flex-direction: column;
    }
    .growth-score {
      text-align: left;
      min-width: 0;
    }
    .growth-chart {
      height: 200px;
    }
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 18px;
    padding: 28px;
    max-width: 620px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-title { font-family: 'Noto Serif JP', serif; font-size: 17px; }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .modal-close:hover { border-color: var(--ink); color: var(--ink); }
  .modal-section { margin-bottom: 18px; }
  .modal-section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .modal-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink2);
    background: var(--bg);
    padding: 12px 14px;
    border-radius: 10px;
    white-space: pre-wrap;
  }
  .modal-feedback {
    background: linear-gradient(135deg, #1a1a2e, #2d2d4e);
    color: rgba(255,255,255,.88);
    font-size: 14px;
    line-height: 1.9;
    padding: 16px 18px;
    border-radius: 10px;
    white-space: pre-wrap;
  }

  /* Progress bar */
  .progress-wrap { margin-bottom: 24px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .5s ease;
  }

  /* streak */
  .streak-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--ink2);
  }
  .streak-fire { font-size: 18px; }
  .streak-num { font-weight: 500; color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">騾ｱ蝣ｱ<span>繧ｳ繝ｼ繝・/span></div>
  <div class="header-actions">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('input')">莉企ｱ繧定ｨ倬鹸</button>
      <button class="nav-tab" onclick="showTab('history')">驕主悉縺ｮ險倬鹸</button>
    </div>
    <div id="pwa-status" class="pwa-pill">APP READY</div>
    <button id="install-btn" class="install-btn" type="button" onclick="installPwa()">Install App</button>
  </div>
</header>

<!-- 笏笏 INPUT TAB 笏笏 -->
<div id="tab-input" class="app active">
  <div class="week-badge">
    <div class="dot"></div>
    <span id="week-label">莉企ｱ</span>
  </div>

  <!-- 莉企ｱ繧・▲縺溘％縺ｨ -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#fff0ea;">統</div>
      <div>
        <div class="card-title">莉企ｱ繧・▲縺溘％縺ｨ</div>
        <div class="card-sub">蜿悶ｊ邨・ｓ縺繧ｿ繧ｹ繧ｯ繝ｻ繝励Ο繧ｸ繧ｧ繧ｯ繝・/div>
      </div>
    </div>
    <textarea id="did" placeholder="萓具ｼ壽眠讖溯・縺ｮ繝・じ繧､繝ｳ譯医ｒ3繝代ち繝ｼ繝ｳ菴懈・縲√メ繝ｼ繝MTG縺ｧ逋ｺ陦ｨ窶ｦ"></textarea>
  </div>

  <!-- 縺・∪縺上＞縺｣縺溘％縺ｨ / 縺・°縺ｪ縺九▲縺溘％縺ｨ -->

    <div class="card-header">
      <div class="card-icon" style="background:#e8f7f4;">笞厄ｸ・/div>
      <div>
        <div class="card-title">縺・∪縺上＞縺｣縺溘％縺ｨ繝ｻ縺・°縺ｪ縺九▲縺溘％縺ｨ</div>
        <div class="card-sub">謖ｯ繧願ｿ斐ｊ縺ｮ縺溘ａ縺ｮ豁｣逶ｴ縺ｪ險倬鹸</div>
      </div>
    </div>
    <textarea id="good" placeholder="縺・∪縺上＞縺｣縺溘％縺ｨ: "></textarea>
    <div style="height:10px"></div>
    <textarea id="bad" placeholder="縺・∪縺上＞縺九↑縺九▲縺溘％縺ｨ: "></textarea>
  </div>

  <!-- 豌励▼縺阪・蟄ｦ縺ｳ -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#f0eeff;">庁</div>
      <div>
        <div class="card-title">豌励▼縺阪・蟄ｦ縺ｳ</div>
        <div class="card-sub">莉企ｱ繝上ャ縺ｨ縺励◆縺薙→繝ｻ譁ｰ縺励￥遏･縺｣縺溘％縺ｨ</div>
      </div>
    </div>
    <textarea id="learning" placeholder="萓具ｼ壹ち繧ｹ繧ｯ縺ｮ蜆ｪ蜈磯・ｽ阪ｒ蜿｣鬆ｭ縺ｧ遒ｺ隱阪☆繧句燕縺ｫ譁・嶌蛹悶☆繧九％縺ｨ縺ｧ隱崎ｭ倥ぜ繝ｬ縺梧ｸ帙▲縺溪ｦ"></textarea>
  </div>

  <!-- 譚･騾ｱ縺ｮ逶ｮ讓・-->
  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#fff8e8;">識</div>
      <div>
        <div class="card-title">譚･騾ｱ縺ｮ逶ｮ讓・/div>
        <div class="card-sub">蜈ｷ菴鍋噪縺ｪ陦悟虚逶ｮ讓・/div>
      </div>
    </div>
    <textarea id="next" placeholder="萓具ｼ壽ｯ取悃9譎ゅ↓繧ｿ繧ｹ繧ｯ繝ｪ繧ｹ繝医ｒ譖ｴ譁ｰ縺吶ｋ縲・ｱ3蝗・0蛻・・髮・ｸｭ繝悶Ο繝・け繧偵き繝ｬ繝ｳ繝繝ｼ縺ｫ蜈･繧後ｋ窶ｦ"></textarea>
  </div>

  <!-- 譌･蝣ｱ -->
  <div class="card">
    <div class="card-header">

function showPwaStatus(message) {

function setupPwa() {

    event.preventDefault();

function renderHistory() {
  const entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  if (entries.length === 0) {

      </div>`;
    return;
  }

  const streak = calcStreak(entries);
  const total = entries.length;
  const growthData = buildGrowthSeries(entries);

  container.innerHTML = `
    ${renderGrowthCard(growthData)}
    <div class="history-toolbar">
      <div class="streak-row">
        <span class="streak-fire">櫨</span>

    <div class="history-grid">
      ${entries.map(e => `
        <div class="history-item" onclick="openModal(${e.id})">

          <div class="history-chips">
            ${e.did ? '<div class="chip filled">繧・▲縺溘％縺ｨ</div>' : ''}
            ${(e.good||e.bad) ? '<div class="chip filled">謖ｯ繧願ｿ斐ｊ</div>' : ''}
            ${e.learning ? '<div class="chip filled">蟄ｦ縺ｳ</div>' : ''}
            ${e.next ? '<div class="chip filled">譚･騾ｱ縺ｮ逶ｮ讓・/div>' : ''}
            ${e.feedback ? '<div class="chip filled">AI繝輔ぅ繝ｼ繝峨ヰ繝・け貂・/div>' : ''}
          </div>
        </div>`).join('')}
    </div>`;
}

function buildGrowthSeries(entries) {
  const ordered = [...entries].reverse();
  const points = ordered.map((entry, index) => {
    const dailyFilled = entry.daily
      ? Object.values(entry.daily).filter(Boolean).length
      : 0;
    const filledSections = [entry.did, entry.good, entry.bad, entry.learning, entry.next]
      .filter(value => Boolean(value && value.trim()))
      .length;
    const feedbackBonus = entry.feedback ? 8 : 0;
    const score = Math.min(100, filledSections * 16 + dailyFilled * 4 + feedbackBonus);
    return {
      id: entry.id,
      label: `W${index + 1}`,
      week: entry.week,
      score
    };
  });

  const latest = points[points.length - 1]?.score ?? 0;
  const previous = points[points.length - 2]?.score ?? latest;
  const delta = latest - previous;
  const average = points.length
    ? Math.round(points.reduce((sum, point) => sum + point.score, 0) / points.length)
    : 0;

  return { points, latest, delta, average };
}

function renderGrowthCard(data) {
  if (!data.points.length) return '';

  const deltaLabel = data.delta > 0 ? `+${data.delta}` : `${data.delta}`;
  const deltaText = data.points.length > 1
    ? `${deltaLabel} pts from last entry`
    : 'Track your first entry to start the trend';

  return `
    <div class="growth-card">
      <div class="growth-header">
        <div>
          <div class="growth-title">Growth Snapshot</div>
          <div class="growth-subtitle">蜈･蜉帙・遨阪∩荳翫′繧翫ｒ繧ｹ繧ｳ繧｢蛹悶＠縺ｦ縲・ｱ縺斐→縺ｮ莨ｸ縺ｳ繧偵・縺ｨ逶ｮ縺ｧ隕九∴繧九ｈ縺・↓縺励∪縺励◆縲・/div>
        </div>

          <div class="growth-score-value">${data.latest}<span>/100</span></div>
        </div>

        <div class="growth-metric">
          <div class="growth-metric-label">Weekly change</div>
          <div class="growth-metric-value">${deltaLabel} pts</div>
          <div class="growth-metric-note">${deltaText}</div>
        </div>
        <div class="growth-metric">
          <div class="growth-metric-label">Average</div>
          <div class="growth-metric-value">${data.average} pts</div>
          <div class="growth-metric-note">Saved entries: ${data.points.length}</div>
        </div>
      </div>
    </div>`;
}

function renderGrowthSvg(points) {
  const width = 760;
  const height = 220;
  const padding = { top: 18, right: 18, bottom: 42, left: 36 };
  const plotWidth = width - padding.left - padding.right;
  const plotHeight = height - padding.top - padding.bottom;
  const steps = [0, 25, 50, 75, 100];
  const safePoints = points.length === 1 ? [points[0], points[0]] : points;

  const coordinates = safePoints.map((point, index) => {
    const x = padding.left + (plotWidth * index) / Math.max(safePoints.length - 1, 1);
    const y = padding.top + plotHeight - (point.score / 100) * plotHeight;
    return { ...point, x, y };
  });

  const linePath = coordinates
    .map((point, index) => `${index === 0 ? 'M' : 'L'} ${point.x} ${point.y}`)
    .join(' ');
  const areaPath = `${linePath} L ${coordinates[coordinates.length - 1].x} ${padding.top + plotHeight} L ${coordinates[0].x} ${padding.top + plotHeight} Z`;

  return `
    <svg class="growth-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Weekly growth chart">
      ${steps.map(step => {
        const y = padding.top + plotHeight - (step / 100) * plotHeight;
        return `
          <line class="growth-grid" x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}"></line>
          <text class="growth-axis" x="${padding.left - 8}" y="${y + 4}" text-anchor="end">${step}</text>`;
      }).join('')}
      <path class="growth-area" d="${areaPath}"></path>
      <path class="growth-line" d="${linePath}"></path>
      ${coordinates.map((point, index) => `
        <circle class="growth-point ${index === coordinates.length - 1 ? 'latest' : ''}" cx="${point.x}" cy="${point.y}" r="${index === coordinates.length - 1 ? 6 : 4.5}"></circle>
      `).join('')}
      ${coordinates.map(point => `
        <text class="growth-axis" x="${point.x}" y="${height - 14}" text-anchor="middle">${point.label}</text>
      `).join('')}
    </svg>`;
}

function exportHistoryAsJson() {
  const entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (!entries.length) {
    alert('繧ｨ繧ｯ繧ｹ繝昴・繝医☆繧句ｱ･豁ｴ縺後∪縺縺ゅｊ縺ｾ縺帙ｓ縲・);
    return;
  }

  const payload = {
    exportedAt: new Date().toISOString(),
    entryCount: entries.length,
    entries
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const dateStamp = new Date().toISOString().slice(0, 10);

  link.href = url;
  link.download = `weekly-coach-history-${dateStamp}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();

  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function triggerJsonImport() {
  const input = document.getElementById('import-json-input');
  input.value = '';
  input.click();
}

async function importHistoryFromJson(event) {
  const file = event.target.files?.[0];
  if (!file) return;

  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    const importedEntries = Array.isArray(parsed) ? parsed : parsed.entries;

    if (!Array.isArray(importedEntries)) {
      throw new Error('invalid format');
    }

    const normalizedEntries = importedEntries
      .filter(entry => entry && typeof entry === 'object')
      .map(entry => ({
        id: entry.id || Date.now() + Math.random(),
        week: entry.week || '',
        date: entry.date || '',
        did: entry.did || '',
        good: entry.good || '',
        bad: entry.bad || '',
        learning: entry.learning || '',
        next: entry.next || '',
        daily: entry.daily && typeof entry.daily === 'object' ? entry.daily : {},
        feedback: entry.feedback || ''
      }));

    const currentEntries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const mergedEntries = [...currentEntries];
    const existingIds = new Set(currentEntries.map(entry => String(entry.id)));

    normalizedEntries.forEach(entry => {
      const key = String(entry.id);
      if (!existingIds.has(key)) {
        mergedEntries.push(entry);
        existingIds.add(key);
      }
    });

    mergedEntries.sort((a, b) => Number(b.id) - Number(a.id));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(mergedEntries));
    renderHistory();

    const addedCount = mergedEntries.length - currentEntries.length;
    alert(`JSON imported. Added ${addedCount} entries.`);
  } catch (error) {
    alert('Failed to import JSON. Please choose a weekly-coach-history file.');
  } finally {
    event.target.value = '';
  }
}

function calcStreak(entries) {
  if (entries.length === 0) return 0;
  return Math.min(entries.length, 4); // simplified streak
}

    ${e.bad ? `<div class="modal-section"><div class="modal-section-title">笞・・縺・∪縺上＞縺九↑縺九▲縺溘％縺ｨ</div><div class="modal-text">${e.bad}</div></div>` : ''}
    ${e.learning ? `<div class="modal-section"><div class="modal-section-title">庁 豌励▼縺阪・蟄ｦ縺ｳ</div><div class="modal-text">${e.learning}</div></div>` : ''}
    ${e.next ? `<div class="modal-section"><div class="modal-section-title">識 譚･騾ｱ縺ｮ逶ｮ讓・/div><div class="modal-text">${e.next}</div></div>` : ''}
    ${dailyHtml ? `<div class="modal-section"><div class="modal-section-title">套 譌･縲・・繝｡繝｢</div><div class="modal-text">${dailyHtml}</div></div>` : ''}
    ${e.feedback ? `<div class="modal-section"><div class="modal-section-title">､・AI繝輔ぅ繝ｼ繝峨ヰ繝・け</div><div class="modal-feedback">${e.feedback}</div></div>` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

setupPwa();
</script>
